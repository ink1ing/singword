name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        run: |
          printf "sdk.dir=%s\n" "${ANDROID_SDK_ROOT:-$ANDROID_HOME}" > android/local.properties

      - name: Verify wordbooks
        run: node scripts/verify_wordbooks.mjs

      - name: Android checks
        run: |
          ./android/gradlew -p android \
            :app:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleDebug \
            :app:assembleRelease

      - name: Build signed local QA APK
        run: ./scripts/build_signed_release.sh

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/apk/release/app-release-unsigned.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode build
        run: |
          xcodebuild \
            -project ios/singword.xcodeproj \
            -scheme singword \
            -destination 'generic/platform=iOS Simulator' \
            build
